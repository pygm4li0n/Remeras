<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BASE SHIRTS</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Orbitron',sans-serif;overflow:hidden;}

/* SPLIT */
.split{display:flex;height:100dvh;}

.half{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:0.4s ease;
}

/* BACKGROUNDS */
.left{
  background:url('https://i.postimg.cc/dQxMSLXF/negra2.png') center/125% no-repeat;
  color:#fff;
}
.right{
  background:url('https://i.postimg.cc/0jLB5JRZ/blanca2.png') center/125% no-repeat;
  color:#000;
}

/* MOBILE FULL */
@media(max-width:768px){
  .left,.right{background-size:cover;}
}

/* HOVER FX */
.half::before{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle, rgba(255,255,255,0.18), transparent 60%);
  opacity:0;
  transition:0.4s;
}

.half:hover::before,
.half.active::before{
  opacity:1;
}

/* SCALE */
.half:hover{
  transform:scale(1.04);
}

/* TEXT */
.text{
  position:relative;
  z-index:2;
  font-size:clamp(32px,6vw,70px);
  letter-spacing:6px;
}

/* PRODUCTS */
.products{
  display:none;
  height:100dvh;
  background:#fff;
}

/* TRACK */
.track{
  display:flex;
  height:100%;
  transition:0.5s ease;
}

/* MOBILE SLIDE */
.slide{
  min-width:100%;
  height:100%;
}

.slide img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* DESKTOP EDITORIAL */
@media(min-width:900px){

  .track{
    padding:60px 80px; /* sangría */
    gap:30px;
    justify-content:center;
    transform:none !important;
  }

  .slide{
    min-width:0;
    width:33.333%;
    height:80vh;
  }

  .slide img{
    border-radius:16px;
    object-fit:cover;
  }

}

/* MOBILE THUMBS */
.thumbs{
  position:absolute;
  bottom:0;
  width:100%;
  display:flex;
  gap:6px;
  padding:10px;
  overflow-x:auto;
  background:rgba(0,0,0,0.4);
}

.thumb{
  min-width:70px;
  height:90px;
  overflow:hidden;
  border-radius:6px;
}

.thumb img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* HIDE THUMBS DESKTOP */
@media(min-width:900px){
  .thumbs{display:none;}
}

/* BACK */
.back{
  position:absolute;
  top:15px;
  left:15px;
  z-index:10;
  background:#000;
  color:#fff;
  padding:6px 10px;
  cursor:pointer;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:#000;
  display:none;
  justify-content:center;
  align-items:center;
}

.modal img{
  max-width:95%;
  max-height:95%;
}

.modal.active{display:flex;}

</style>
</head>

<body>

<!-- HOME -->
<div class="split" id="home">
  <div class="half left"><div class="text">NEGRA</div></div>
  <div class="half right"><div class="text">BLANCA</div></div>
</div>

<!-- PRODUCTS -->
<div class="products" id="products">

  <div class="back" onclick="goBack()">←</div>

  <div class="track" id="track"></div>

  <div class="thumbs" id="thumbs"></div>

</div>

<!-- MODAL -->
<div class="modal" id="modal" onclick="closeModal()">
  <img id="modalImg">
</div>

<script>

/* HOVER + TOUCH */
const halves=document.querySelectorAll('.half');

halves.forEach(h=>{
  h.onclick=()=>{
    const cat=h.classList.contains('left')?'black':'white';
    load(cat);
  };

  h.addEventListener('mouseenter',()=>activate(h));
  h.addEventListener('touchstart',()=>activate(h));
});

function activate(el){
  halves.forEach(h=>h.classList.remove('active'));
  el.classList.add('active');
}

/* PARALLAX */
document.addEventListener("mousemove",e=>{
  const x=(e.clientX/window.innerWidth-0.5)*6;
  const y=(e.clientY/window.innerHeight-0.5)*6;

  halves.forEach(el=>{
    el.style.backgroundPosition=`${50+x}% ${50+y}%`;
  });
});

/* DATA */
const data={
  white:[
    "https://i.postimg.cc/NjT50hTy/b4803a98_eb05_44d5_8e02_79754f8b2658.png",
    "https://via.placeholder.com/800x1200/fff/000?text=2",
    "https://via.placeholder.com/800x1200/fff/000?text=3",
    "https://via.placeholder.com/800x1200/fff/000?text=4"
  ],
  black:[
    "https://via.placeholder.com/800x1200/000/fff?text=1",
    "https://via.placeholder.com/800x1200/000/fff?text=2",
    "https://via.placeholder.com/800x1200/000/fff?text=3"
  ]
};

function load(cat){
  document.getElementById('home').style.display='none';
  document.getElementById('products').style.display='block';

  const track=document.getElementById('track');
  const thumbs=document.getElementById('thumbs');

  track.innerHTML='';
  thumbs.innerHTML='';

  data[cat].forEach((img,i)=>{
    track.innerHTML+=`
      <div class="slide" onclick="openModal('${img}')">
        <img src="${img}">
      </div>
    `;

    thumbs.innerHTML+=`
      <div class="thumb" onclick="openModal('${img}')">
        <img src="${img}">
      </div>
    `;
  });
}

/* BACK */
function goBack(){
  document.getElementById('home').style.display='flex';
  document.getElementById('products').style.display='none';
}

/* MODAL */
function openModal(src){
  document.getElementById('modal').classList.add('active');
  document.getElementById('modalImg').src=src;
}

function closeModal(){
  document.getElementById('modal').classList.remove('active');
}

</script>

</body>
</html>
