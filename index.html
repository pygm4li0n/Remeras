<style>

/* BASE */
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body {
  font-family:'Orbitron', sans-serif;
  overflow:hidden;
}

/* SPLIT */
.split {
  display:flex;
  height:100vh;
}

.half {
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:0.5s;
}

/* DESKTOP TEXTURAS */
.left {
  background-image:url('https://i.postimg.cc/dQxMSLXF/negra2.png');
  background-size:125%;
  background-position:center;
  background-repeat:no-repeat;
  color:#fff;
}

.right {
  background-image:url('https://i.postimg.cc/0jLB5JRZ/blanca2.png');
  background-size:125%;
  background-position:center;
  background-repeat:no-repeat;
  color:#000;
}

/* MOBILE FULL BACKGROUND */
@media(max-width:768px){

  .split {
    height:100dvh; /* clave para mobile real */
  }

  .half {
    height:100dvh;
  }

  .left,
  .right {
    background-size:cover !important;
    background-position:center center !important;
  }

}

/* HOVER / TOUCH */
.half::before {
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle, rgba(255,255,255,0.2), transparent 60%);
  opacity:0;
  transition:0.4s;
}

.half:hover::before,
.half.active::before {
  opacity:1;
}

.half:hover,
.half.active {
  flex:1.3;
}

/* TEXT */
.text {
  position:relative;
  z-index:2;
  font-size:clamp(30px,6vw,70px);
  letter-spacing:5px;
}

/* PRODUCTS */
.products {
  display:none;
  background:#fff;
  min-height:100vh;
  overflow-y:auto;
}

/* GRID DESKTOP */
.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
  padding:20px;
}

/* MOBILE FEED */
@media(max-width:600px){

  .grid {
    display:flex;
    flex-direction:column;
    gap:0;
    padding:0;
  }

  .card {
    height:100dvh;
  }

  .card img {
    width:100%;
    height:100%;
    object-fit:cover;
  }

}

/* CARD */
.card {
  border-radius:14px;
  overflow:hidden;
  background:#eee;
  cursor:pointer;
}

.card img {
  width:100%;
  height:300px;
  object-fit:cover;
}

/* BACK */
.back {
  position:fixed;
  top:15px;
  left:15px;
  z-index:10;
  cursor:pointer;
  font-size:12px;
  background:#000;
  color:#fff;
  padding:6px 10px;
  border-radius:6px;
}

/* MODAL */
.modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:20;
}

.modal img {
  max-width:95%;
  max-height:95%;
}

.modal.active {
  display:flex;
}

</style>
