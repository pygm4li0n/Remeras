<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BASE SHIRTS</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body {
  font-family:'Orbitron', sans-serif;
  overflow:hidden;
}

/* LOGO */
.logo {
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  width:120px;
  height:50px;
  z-index:10;
  display:flex;
  align-items:center;
  justify-content:center;
}

.logo img {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:contain;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  transition:opacity 0.35s ease;
}

.show { opacity:1; }
.hide { opacity:0; }

/* SPLIT */
.split {
  display:flex;
  height:100vh;
}

/* HALVES */
.half {
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  position:relative;
  transition:0.5s;
  overflow:hidden;
}

/* TEXTURAS */
.left {
  background-image:url('https://i.postimg.cc/HnShqP30/Chat_GPT_Image_4_abr_2026_23_48_08.png');
  background-size:cover;
  background-position:center;
  color:#fff;
}

.right {
  background-image:url('https://i.postimg.cc/3J1GTQXK/Chat-GPT-Image-4-abr-2026-23-54-33-(1).png');
  background-size:cover;
  background-position:center;
  color:#000;
}

/* OVERLAY EDITORIAL */
.left::before,
.right::before {
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
}

/* NEGRA → más profundidad */
.left::before {
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,0.08), transparent 60%),
    linear-gradient(to bottom, rgba(0,0,0,0.4), rgba(0,0,0,0.8));
}

/* BLANCA → contraste editorial */
.right::before {
  background:
    radial-gradient(circle at 70% 30%, rgba(0,0,0,0.1), transparent 60%),
    linear-gradient(to bottom, rgba(255,255,255,0.3), rgba(255,255,255,0.6));
  backdrop-filter: brightness(1.08) contrast(1.6);
}

/* FILM GRAIN */
.half::after {
  content:"";
  position:absolute;
  inset:0;
  opacity:0.08;
  pointer-events:none;
  background-image:url('https://grainy-gradients.vercel.app/noise.svg');
  animation:grain 0.3s steps(2) infinite;
}

@keyframes grain {
  0% { transform:translate(0,0); }
  100% { transform:translate(-5%, -5%); }
}

/* TEXTO */
.text {
  position:relative;
  z-index:2;
  font-size:clamp(28px,5vw,70px);
  letter-spacing:4px;
  text-transform:uppercase;
  transition:0.3s;
}

/* glow NEGRA */
.left .text {
  text-shadow:
    0 0 10px rgba(255,255,255,0.5),
    0 0 30px rgba(255,255,255,0.2);
}

/* glow BLANCA */
.right .text {
  text-shadow:
    0 0 8px rgba(0,0,0,0.4),
    0 0 20px rgba(0,0,0,0.2);
}

/* HOVER EXPAND */
.half:hover {
  flex:1.2;
}

/* PRODUCTS */
.products {
  display:none;
  padding:20px;
  background:#fff;
  min-height:100vh;
  animation:fade 0.4s ease;
}

@keyframes fade {
  from {opacity:0;}
  to {opacity:1;}
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns: repeat(2,1fr);
  gap:20px;
}

@media(max-width:600px){
  .grid {
    grid-template-columns: repeat(3,1fr);
    gap:10px;
  }
}

.card {
  border:1px solid #ddd;
}

.card img {
  width:100%;
  height:200px;
  object-fit:cover;
}

@media(max-width:600px){
  .card img {
    height:120px;
  }
}

/* BACK */
.back {
  margin-bottom:20px;
  cursor:pointer;
  font-size:14px;
  opacity:0.6;
}
</style>
</head>

<body>

<div class="logo">
  <img id="logoWhite" src="https://i.postimg.cc/WD8MJCtn/white.png">
  <img id="logoBlack" src="https://i.postimg.cc/jWczJmCc/negro.png">
</div>

<div class="split" id="home">
  <div class="half left" onclick="show('black')">
    <div class="text">NEGRA</div>
  </div>

  <div class="half right" onclick="show('white')">
    <div class="text">BLANCA</div>
  </div>
</div>

<div class="products" id="products">
  <div class="back" onclick="goBack()">← VOLVER</div>
  <div class="grid" id="grid"></div>
</div>

<script>
const logoWhite = document.getElementById('logoWhite');
const logoBlack = document.getElementById('logoBlack');

function setLogo(mode){
  if(mode === 'black'){
    logoWhite.classList.add('show');
    logoWhite.classList.remove('hide');
    logoBlack.classList.add('hide');
    logoBlack.classList.remove('show');
  } else {
    logoBlack.classList.add('show');
    logoBlack.classList.remove('hide');
    logoWhite.classList.add('hide');
    logoWhite.classList.remove('show');
  }
}

setLogo('white');

/* CURSOR + PARALLAX */
document.addEventListener("mousemove", (e) => {
  const home = document.getElementById("home");
  if(home.style.display === "none") return;

  const middle = window.innerWidth / 2;

  if (e.clientX < middle) {
    setLogo('black');
  } else {
    setLogo('white');
  }

  /* PARALLAX */
  const x = (e.clientX / window.innerWidth - 0.5) * 10;
  const y = (e.clientY / window.innerHeight - 0.5) * 10;

  document.querySelectorAll('.half').forEach(el=>{
    el.style.backgroundPosition = `${50 + x}% ${50 + y}%`;
  });
});

/* PRODUCTOS */
const productos = [
  {cat:'black', img:'https://via.placeholder.com/300/000000/ffffff'},
  {cat:'black', img:'https://via.placeholder.com/300/000000/ffffff'},
  {cat:'black', img:'https://via.placeholder.com/300/000000/ffffff'},
  {cat:'black', img:'https://via.placeholder.com/300/000000/ffffff'},
  {cat:'black', img:'https://via.placeholder.com/300/000000/ffffff'},

  {cat:'white', img:'https://via.placeholder.com/300/ffffff/000000'},
  {cat:'white', img:'https://via.placeholder.com/300/ffffff/000000'},
  {cat:'white', img:'https://via.placeholder.com/300/ffffff/000000'},
  {cat:'white', img:'https://via.placeholder.com/300/ffffff/000000'},
  {cat:'white', img:'https://via.placeholder.com/300/ffffff/000000'}
];

function show(cat){
  document.getElementById('home').style.display = 'none';
  document.getElementById('products').style.display = 'block';
  setLogo(cat);

  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  productos
    .filter(p => p.cat === cat)
    .forEach(p => {
      grid.innerHTML += `
        <div class="card">
          <img src="${p.img}">
        </div>
      `;
    });
}

function goBack(){
  document.getElementById('home').style.display = 'flex';
  document.getElementById('products').style.display = 'none';
  setLogo('white');
}
</script>

</body>
</html>
