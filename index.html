<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BASE SHIRTS</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body {
  font-family:'Orbitron', sans-serif;
  overflow:hidden;
}

/* SPLIT */
.split {
  display:flex;
  height:100vh;
}

.half {
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  position:relative;
  transition:0.5s;
  overflow:hidden;
}

/* TEXTURAS PURAS */
.left {
  background-image:url('https://i.postimg.cc/dQxMSLXF/negra2.png');
  background-size:cover;
  background-position:center;
  color:#fff;
}

.right {
  background-image:url('https://i.postimg.cc/0jLB5JRZ/blanca2.png');
  background-size:cover;
  background-position:center;
  color:#000;
}

/* GRAIN (opcional, no afecta color real) */
.half::after {
  content:"";
  position:absolute;
  inset:0;
  opacity:0.05;
  pointer-events:none;
  background-image:url('https://grainy-gradients.vercel.app/noise.svg');
}

/* TEXTO */
.text {
  position:relative;
  z-index:2;
  font-size:clamp(28px,5vw,70px);
  letter-spacing:4px;
  text-transform:uppercase;
}

/* glow */
.left .text {
  text-shadow:0 0 10px rgba(255,255,255,0.4);
}

.right .text {
  text-shadow:0 0 10px rgba(0,0,0,0.3);
}

/* hover */
.half:hover {
  flex:1.2;
}

/* PRODUCTS */
.products {
  display:none;
  padding:20px;
  background:#fff;
  min-height:100vh;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns: repeat(2,1fr);
  gap:20px;
}

@media(max-width:600px){
  .grid {
    grid-template-columns: repeat(3,1fr);
    gap:10px;
  }
}

.card {
  border:1px solid #ddd;
}

.card img {
  width:100%;
  height:200px;
  object-fit:cover;
}

@media(max-width:600px){
  .card img {
    height:120px;
  }
}

/* BACK */
.back {
  margin-bottom:20px;
  cursor:pointer;
  font-size:14px;
  opacity:0.6;
}
</style>
</head>

<body>

<div class="split" id="home">
  <div class="half left" onclick="show('black')">
    <div class="text">NEGRA</div>
  </div>

  <div class="half right" onclick="show('white')">
    <div class="text">BLANCA</div>
  </div>
</div>

<div class="products" id="products">
  <div class="back" onclick="goBack()">← VOLVER</div>
  <div class="grid" id="grid"></div>
</div>

<script>

/* PARALLAX SUAVE */
document.addEventListener("mousemove", (e) => {
  const home = document.getElementById("home");
  if(home.style.display === "none") return;

  const x = (e.clientX / window.innerWidth - 0.5) * 4;
  const y = (e.clientY / window.innerHeight - 0.5) * 4;

  document.querySelectorAll('.half').forEach(el=>{
    el.style.backgroundPosition = `${50 + x}% ${50 + y}%`;
  });
});

/* PRODUCTOS */
const productos = [
  {cat:'black', img:'https://via.placeholder.com/300/000000/ffffff'},
  {cat:'black', img:'https://via.placeholder.com/300/000000/ffffff'},
  {cat:'black', img:'https://via.placeholder.com/300/000000/ffffff'},
  {cat:'black', img:'https://via.placeholder.com/300/000000/ffffff'},
  {cat:'black', img:'https://via.placeholder.com/300/000000/ffffff'},

  {cat:'white', img:'https://via.placeholder.com/300/ffffff/000000'},
  {cat:'white', img:'https://via.placeholder.com/300/ffffff/000000'},
  {cat:'white', img:'https://via.placeholder.com/300/ffffff/000000'},
  {cat:'white', img:'https://via.placeholder.com/300/ffffff/000000'},
  {cat:'white', img:'https://via.placeholder.com/300/ffffff/000000'}
];

function show(cat){
  document.getElementById('home').style.display = 'none';
  document.getElementById('products').style.display = 'block';

  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  productos
    .filter(p => p.cat === cat)
    .forEach(p => {
      grid.innerHTML += `
        <div class="card">
          <img src="${p.img}">
        </div>
      `;
    });
}

function goBack(){
  document.getElementById('home').style.display = 'flex';
  document.getElementById('products').style.display = 'none';
}
</script>

</body>
</html>
