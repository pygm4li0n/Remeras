<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BASE SHIRTS</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Orbitron',sans-serif;overflow:hidden;}

/* SPLIT */
.split{
  display:flex;
  height:100dvh;
}

.half{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:0.35s;
}

/* BACKGROUNDS */
.left{
  background:url('https://i.postimg.cc/dQxMSLXF/negra2.png') center/125% no-repeat;
  color:#fff;
}
.right{
  background:url('https://i.postimg.cc/0jLB5JRZ/blanca2.png') center/125% no-repeat;
  color:#000;
}

@media(max-width:768px){
  .left,.right{background-size:cover;}
}

/* HOVER */
.half::before{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle, rgba(255,255,255,0.2), transparent 60%);
  opacity:0;
  transition:0.3s;
}

.half:hover::before,
.half.active::before{
  opacity:1;
}

.half::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(120deg, transparent, rgba(255,255,255,0.08), transparent);
  opacity:0;
  transition:0.4s;
}

.half:hover::after{
  opacity:1;
}

.half:hover{
  transform:scale(1.02);
}

/* TEXT */
.text{
  font-size:clamp(40px,6vw,72px);
  letter-spacing:6px;
}

/* PRODUCTS */
.products{
  display:none;
  height:100dvh;
  width:100vw;
  background:#fff;
  position:relative;
}

/* VIEWER */
.viewer{
  position:absolute;
  left:0;
  top:0;
  height:100%;
  width:60%;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:40px;
}

.viewer img{
  max-width:90%;
  max-height:90%;
  object-fit:contain;
}

/* INFO PANEL */
.info{
  position:absolute;
  left:62%;
  top:50%;
  transform:translateY(-50%);
  width:30%;
  max-width:480px;
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  justify-content:center;
  gap:12px;
  color:#111;
}

/* NEGRA ITEMS: 20% bigger */
.products.black .info .title{
  font-size:38px; /* 32px -> 38px */
}

.products.black .info .rating{
  font-size:1.2em;
}

.products.black .info .rating span{
  font-size:14px; /* 12px -> 14px */
}

.products.black .info .price{
  font-size:52px; /* 44px -> 52px */
}

.products.black .info .subtitle{
  font-size:16px; /* 14px -> 16px */
}

/* TEXT INFO */
.tag{
  font-size:14px;
  opacity:0.6;
}

.title{
  font-size:32px;
  line-height:1.15;
}

.rating{
  color:#3483fa;
}

.rating span{
  color:#666;
  font-size:12px;
}

.price{
  font-size:44px;
  font-weight:800;
}

.subtitle{
  font-size:14px;
  opacity:0.6;
}

/* SIZES */
.sizes span{
  font-size:14px;
}

.size-list{
  display:flex;
  gap:10px;
  margin-top:8px;
}

.size-list button{
  border:1px solid #000;
  background:none;
  padding:8px 14px;
  cursor:pointer;
  transition:0.2s;
}

.size-list button:hover{
  background:#000;
  color:#fff;
}

/* BUY */
.buy{
  width:60%;
  margin-top:12px;
  padding:14px;
  background:#3483fa;
  color:#fff;
  text-align:center;
  text-decoration:none;
  font-weight:700;
  border-radius:8px;
  transition:0.25s;
  align-self:flex-start;
}

.buy:hover{
  background:#2968c8;
}

/* BACK */
.back{
  position:absolute;
  top:20px;
  left:20px;
  z-index:10;
  background:#000;
  color:#fff;
  padding:8px 12px;
  cursor:pointer;
  border-radius:6px;
}

/* THUMBS */
.side{
  position:absolute;
  left:20px;
  bottom:20px;
  display:flex;
  gap:10px;
}

.thumb{
  width:60px;  /* same size for negra and blanca */
  height:80px; /* same size for negra and blanca */
  overflow:hidden;
  border-radius:6px;
  cursor:pointer;
  opacity:0.6;
  transition:0.3s;
}

.thumb img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.thumb:hover{
  opacity:1;
  transform:scale(1.05);
}

/* MOBILE */
@media(max-width:768px){

  .viewer{
    width:100%;
  }

  .viewer img{
    max-width:82%;
    max-height:82%;
  }

  .info{
    left:0;
    width:100%;
    transform:none;
    bottom:0;
    top:auto;
    padding:20px;
    align-items:center;
    text-align:center;
    background:#fff;
  }

  .buy{
    width:80%;
    align-self:center;
  }

  .text{
    font-size:32px;
  }

  .side{
    bottom:120px;
    left:50%;
    transform:translateX(-50%);
  }
}

</style>
</head>

<body>

<!-- HOME -->
<div class="split" id="home">
  <div class="half left"><div class="text">NEGRA</div></div>
  <div class="half right"><div class="text">BLANCA</div></div>
</div>

<!-- PRODUCTS -->
<div class="products" id="products">

  <div class="back" onclick="goBack()">←</div>

  <div class="viewer">
    <img id="mainImg">
  </div>

  <div class="info">
    <div class="tag">Nuevo | +50 vendidos</div>
    <div class="title">Base Shirt Minimal Logo</div>
    <div class="rating">★★★★★ <span>(9)</span></div>
    <div class="price">$7.000</div>
    <div class="subtitle">Precio sin impuestos nacionales</div>

    <div class="sizes">
      <span>Talles:</span>
      <div class="size-list">
        <button>S</button>
        <button>M</button>
        <button>L</button>
        <button>XL</button>
      </div>
    </div>

    <a href="https://mpago.li/2NvhvZd" target="_blank" class="buy">
      COMPRAR
    </a>
  </div>

  <div class="side" id="thumbs"></div>

</div>

<script>

const halves=document.querySelectorAll('.half');

halves.forEach(h=>{
  h.onclick=()=>{
    const cat=h.classList.contains('left')?'black':'white';
    load(cat);
  };
});

const data={
  white:[
    "https://i.postimg.cc/NjT50hTy/b4803a98_eb05_44d5_8e02_79754f8b2658.png",
    "https://via.placeholder.com/800x1200/ffffff/000?text=2",
    "https://via.placeholder.com/800x1200/ffffff/000?text=3"
  ],

  black:[
    "https://i.postimg.cc/y33jcKJp/7ee1fdef-d878-4da7-b054-0f25608be346-(6).png",
    "https://i.postimg.cc/vxxhfygR/Chat-GPT-Image-26-mar-2026-16-57-06-(5).png",
    "https://i.postimg.cc/gLLs8pwC/Chat-GPT-Image-26-mar-2026-16-57-06-(6).png"
  ]
};

function load(cat){
  document.getElementById('home').style.display='none';
  const products=document.getElementById('products');
  products.style.display='block';

  // Añadir clase para negra stats
  if(cat==='black'){
    products.classList.add('black');
  } else {
    products.classList.remove('black');
  }

  const thumbs=document.getElementById('thumbs');
  const main=document.getElementById('mainImg');

  thumbs.innerHTML='';

  data[cat].forEach((img,i)=>{
    if(i===0) main.src=img;

    thumbs.innerHTML+=`
      <div class="thumb" onclick="setImg('${img}')">
        <img src="${img}">
      </div>
    `;
  });
}

function setImg(src){
  document.getElementById('mainImg').src=src;
}

function goBack(){
  document.getElementById('home').style.display='flex';
  document.getElementById('products').style.display='none';
}

</script>

</body>
</html>
