<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BASE SHIRTS</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Orbitron',sans-serif;overflow:hidden;}

/* HOME SPLIT */
.split{
  display:flex;
  height:100dvh;
}

.half{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:0.35s ease;
}

/* BACKGROUNDS */
.left{
  background:url('https://i.postimg.cc/dQxMSLXF/negra2.png') center/125% no-repeat;
  color:#fff;
}
.right{
  background:url('https://i.postimg.cc/0jLB5JRZ/blanca2.png') center/125% no-repeat;
  color:#000;
}

/* MOBILE */
@media(max-width:768px){
  .left,.right{background-size:cover;}
}

/* 🔥 HOVER PRO */
.half::before{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle at center, rgba(255,255,255,0.22), transparent 65%);
  opacity:0;
  transition:0.35s;
}

.half:hover::before,
.half.active::before{
  opacity:1;
}

/* shine subtle */
.half::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(120deg, transparent, rgba(255,255,255,0.08), transparent);
  opacity:0;
  transition:0.4s;
}

.half:hover::after{
  opacity:1;
}

/* leve escala elegante */
.half:hover{
  transform:scale(1.02);
}

/* TEXT MEJORADO */
.text{
  font-size:clamp(26px,4.5vw,48px);
  letter-spacing:4px;
  opacity:0.95;
}

/* PRODUCTS (EDITORIAL FULL CENTER) */
.products{
  display:none;
  height:100dvh;
  width:100vw;
  background:#fff;
  position:relative;
}

/* CENTER IMAGE */
.viewer{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:40px;
}

.viewer img{
  max-width:100%;
  max-height:100%;
  object-fit:contain;
}

/* BACK */
.back{
  position:absolute;
  top:20px;
  left:20px;
  z-index:10;
  background:#000;
  color:#fff;
  padding:8px 12px;
  font-size:12px;
  cursor:pointer;
  border-radius:6px;
}

/* SIDE THUMBS */
.side{
  position:absolute;
  right:20px;
  top:50%;
  transform:translateY(-50%);
  display:flex;
  flex-direction:column;
  gap:10px;
}

.thumb{
  width:60px;
  height:80px;
  overflow:hidden;
  border-radius:6px;
  cursor:pointer;
  opacity:0.6;
  transition:0.3s;
}

.thumb img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.thumb:hover{
  opacity:1;
  transform:scale(1.05);
}

/* MOBILE THUMBS BOTTOM */
@media(max-width:768px){
  .side{
    bottom:10px;
    top:auto;
    right:50%;
    transform:translateX(50%);
    flex-direction:row;
  }

  .thumb{
    width:50px;
    height:70px;
  }
}

</style>
</head>

<body>

<!-- HOME -->
<div class="split" id="home">
  <div class="half left"><div class="text">NEGRA</div></div>
  <div class="half right"><div class="text">BLANCA</div></div>
</div>

<!-- PRODUCTS -->
<div class="products" id="products">

  <div class="back" onclick="goBack()">←</div>

  <div class="viewer">
    <img id="mainImg">
  </div>

  <div class="side" id="thumbs"></div>

</div>

<script>

/* HOVER TOUCH */
const halves=document.querySelectorAll('.half');

halves.forEach(h=>{
  h.onclick=()=>{
    const cat=h.classList.contains('left')?'black':'white';
    load(cat);
  };

  h.addEventListener('mouseenter',()=>activate(h));
  h.addEventListener('touchstart',()=>activate(h));
});

function activate(el){
  halves.forEach(h=>h.classList.remove('active'));
  el.classList.add('active');
}

/* DATA */
const data={
  white:[
    "https://i.postimg.cc/NjT50hTy/b4803a98_eb05_44d5_8e02_79754f8b2658.png",
    "https://via.placeholder.com/800x1200/ffffff/000?text=2",
    "https://via.placeholder.com/800x1200/ffffff/000?text=3"
  ],
  black:[
    "https://via.placeholder.com/800x1200/000/fff?text=1",
    "https://via.placeholder.com/800x1200/000/fff?text=2",
    "https://via.placeholder.com/800x1200/000/fff?text=3"
  ]
};

function load(cat){
  document.getElementById('home').style.display='none';
  document.getElementById('products').style.display='block';

  const thumbs=document.getElementById('thumbs');
  const main=document.getElementById('mainImg');

  thumbs.innerHTML='';

  data[cat].forEach((img,i)=>{
    if(i===0) main.src=img;

    thumbs.innerHTML+=`
      <div class="thumb" onclick="setImg('${img}')">
        <img src="${img}">
      </div>
    `;
  });
}

function setImg(src){
  document.getElementById('mainImg').src=src;
}

function goBack(){
  document.getElementById('home').style.display='flex';
  document.getElementById('products').style.display='none';
}

</script>

</body>
</html>
