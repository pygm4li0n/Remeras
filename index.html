<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BASE SHIRTS</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body {
  font-family:'Orbitron', sans-serif;
  overflow:hidden;
}

/* SPLIT */
.split {
  display:flex;
  height:100vh;
}

.half {
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:0.5s;
}

/* TEXTURAS */
.left {
  background-image:url('https://i.postimg.cc/dQxMSLXF/negra2.png');
  background-size:125%;
  background-position:center;
  background-repeat:no-repeat;
  color:#fff;
}

.right {
  background-image:url('https://i.postimg.cc/0jLB5JRZ/blanca2.png');
  background-size:125%;
  background-position:center;
  background-repeat:no-repeat;
  color:#000;
}

/* HOVER */
.half::before {
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle, rgba(255,255,255,0.15), transparent 60%);
  opacity:0;
  transition:0.4s;
}

.half:hover::before,
.half.active::before {
  opacity:1;
}

.half:hover,
.half.active {
  flex:1.3;
}

/* TEXT */
.text {
  position:relative;
  z-index:2;
  font-size:clamp(28px,5vw,70px);
  letter-spacing:4px;
}

/* PRODUCTS */
.products {
  display:none;
  background:#fff;
  min-height:100vh;
  overflow-y:auto;
}

/* DESKTOP GRID */
.grid {
  display:grid;
  grid-template-columns: repeat(2,1fr);
  gap:20px;
  padding:20px;
}

/* MOBILE FULLSCREEN FEED */
@media(max-width:600px){

  .grid {
    display:flex;
    flex-direction:column;
    gap:0;
    padding:0;
  }

  .card {
    height:100vh;
    width:100%;
  }

  .card img {
    width:100%;
    height:100%;
    object-fit:cover;
  }

}

/* DESKTOP CARD */
.card {
  border-radius:14px;
  overflow:hidden;
  background:#f5f5f5;
  cursor:pointer;
}

.card img {
  width:100%;
  height:300px;
  object-fit:cover;
}

/* BACK */
.back {
  position:fixed;
  top:15px;
  left:15px;
  z-index:10;
  cursor:pointer;
  font-size:12px;
  background:#000;
  color:#fff;
  padding:6px 10px;
  border-radius:6px;
}

/* MODAL */
.modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:20;
}

.modal img {
  max-width:90%;
  max-height:90%;
}

.modal.active {
  display:flex;
}
</style>
</head>

<body>

<div class="split" id="home">
  <div class="half left"><div class="text">NEGRA</div></div>
  <div class="half right"><div class="text">BLANCA</div></div>
</div>

<div class="products" id="products">
  <div class="back" onclick="goBack()">←</div>
  <div class="grid" id="grid"></div>
</div>

<div class="modal" id="modal" onclick="closeModal()">
  <img id="modalImg">
</div>

<script>

const halves = document.querySelectorAll('.half');

halves.forEach(h=>{
  h.addEventListener('click', ()=>{
    const cat = h.classList.contains('left') ? 'black' : 'white';
    show(cat);
  });

  h.addEventListener('mouseenter', ()=>activate(h));
  h.addEventListener('touchstart', ()=>activate(h));
});

function activate(el){
  halves.forEach(h=>h.classList.remove('active'));
  el.classList.add('active');
}

/* PARALLAX */
document.addEventListener("mousemove", moveBg);
document.addEventListener("touchmove", (e)=>moveBg(e.touches[0]));

function moveBg(e){
  const home = document.getElementById("home");
  if(home.style.display === "none") return;

  const x = (e.clientX / window.innerWidth - 0.5) * 6;
  const y = (e.clientY / window.innerHeight - 0.5) * 6;

  halves.forEach(el=>{
    el.style.backgroundPosition = `${50 + x}% ${50 + y}%`;
  });
}

/* PRODUCTOS */
const productos = [
  {cat:'black', img:'https://via.placeholder.com/800x1200/000000/ffffff?text=BLACK+1'},
  {cat:'black', img:'https://via.placeholder.com/800x1200/000000/ffffff?text=BLACK+2'},
  {cat:'black', img:'https://via.placeholder.com/800x1200/000000/ffffff?text=BLACK+3'},
  {cat:'black', img:'https://via.placeholder.com/800x1200/000000/ffffff?text=BLACK+4'},
  {cat:'black', img:'https://via.placeholder.com/800x1200/000000/ffffff?text=BLACK+5'},

  {cat:'white', img:'https://i.postimg.cc/NjT50hTy/b4803a98_eb05_44d5_8e02_79754f8b2658.png'},
  {cat:'white', img:'https://via.placeholder.com/800x1200/ffffff/000000?text=WHITE+2'},
  {cat:'white', img:'https://via.placeholder.com/800x1200/ffffff/000000?text=WHITE+3'},
  {cat:'white', img:'https://via.placeholder.com/800x1200/ffffff/000000?text=WHITE+4'},
  {cat:'white', img:'https://via.placeholder.com/800x1200/ffffff/000000?text=WHITE+5'}
];

function show(cat){
  document.getElementById('home').style.display = 'none';
  document.getElementById('products').style.display = 'block';

  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  productos
    .filter(p => p.cat === cat)
    .forEach(p => {
      grid.innerHTML += `
        <div class="card" onclick="openModal('${p.img}')">
          <img src="${p.img}">
        </div>
      `;
    });
}

function goBack(){
  document.getElementById('home').style.display = 'flex';
  document.getElementById('products').style.display = 'none';
}

/* MODAL */
function openModal(src){
  document.getElementById('modal').classList.add('active');
  document.getElementById('modalImg').src = src;
}

function closeModal(){
  document.getElementById('modal').classList.remove('active');
}

</script>

</body>
</html>
